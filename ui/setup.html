<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="setupPageTitle">Asetukset</title>
    <link rel="stylesheet" href="popup.css">
    <style>
        body { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
        .setup-container {
            width: 100%;
            max-width: 420px;
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            padding: 32px;
            border: 1px solid #e9ecef;
        }
        .setup-title { font-size: 22px; font-weight: 600; color: #643695; margin-bottom: 24px; text-align: center; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-weight: 500; margin-bottom: 8px; color: #333; }
        .form-group input, .form-group select {
            width: 100%;
            padding: 10px 12px;
            font-size: 15px;
            border: 1px solid #ddd;
            border-radius: 6px;
            background: #fff;
        }
        .form-group select { cursor: pointer; }
        .form-group input:focus, .form-group select:focus { outline: none; border-color: #643695; box-shadow: 0 0 0 2px rgba(100, 54, 149, 0.2); }
        .btn-save {
            width: 100%;
            padding: 12px 16px;
            font-size: 15px;
            font-weight: 600;
            background: #643695;
            color: #fff;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }
        .btn-save:hover { background: #552a7d; }
        .btn-save:disabled { opacity: 0.6; cursor: not-allowed; }
        .form-hint { font-size: 12px; color: #6c757d; margin-top: 6px; }
        .success-msg { display: none; }
    </style>
</head>
<body>
    <div class="setup-container">
        <h1 class="setup-title" data-i18n="setupPageTitle">Asetukset</h1>
        <div class="form-group">
            <label for="langSelect" data-i18n="setupLangLabel">Kieli</label>
            <select id="langSelect">
                <option value="fi" data-i18n="setupLangFi">Suomi</option>
                <option value="en" data-i18n="setupLangEn">English</option>
            </select>
        </div>
        <form id="setupForm">
            <div class="form-group">
                <label for="schoolName" data-i18n="setupSchoolLabel">Koulun nimi (hakusana)</label>
                <input type="text" id="schoolName" data-i18n="setupSchoolPlaceholder" data-i18n-attr="placeholder" required autocomplete="off">
                <p class="form-hint" data-i18n="setupSchoolHint">Hakutermi, jolla koulu löytyy mpass-proxy.csc.fi -sivulla.</p>
            </div>
            <div class="form-group">
                <label for="adfsDomain" data-i18n="setupDomainLabel">Kirjautumisdomain</label>
                <input type="text" id="adfsDomain" data-i18n="setupDomainPlaceholder" data-i18n-attr="placeholder" required autocomplete="off">
                <p class="form-hint" data-i18n="setupDomainHint">Osoite näkyy selaimen osoitepalkissa kun olet kunnan kirjautumissivulla.</p>
            </div>
            <button type="submit" class="btn-save" id="saveBtn" data-i18n="setupSaveBtn">Tallenna</button>
            <p class="success-msg" id="successMsg" data-i18n="setupSuccessMsg" style="display:none">Asetukset tallennettu.</p>
        </form>
    </div>
    <script src="i18n.js"></script>
    <script src="setup.js"></script>
</body>
</html>
