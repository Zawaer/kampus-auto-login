<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kampus Auto Login</title>
    <link rel="stylesheet" href="popup.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1 data-i18n="popupTitle">Kampus Auto Login</h1>
        </div>
        
        <div class="content">
            <div class="toggle-section">
                <label class="toggle-label">
                    <span class="toggle-text" data-i18n="popupEnableToggle">Enable Auto Login</span>
                    <div class="toggle-switch">
                        <input type="checkbox" id="autoLoginToggle">
                        <span class="slider"></span>
                    </div>
                </label>
            </div>

            <div class="toggle-section">
                <label class="toggle-label">
                    <span class="toggle-text" data-i18n="popupAutofillToggle">Use autofilled credentials automatically</span>
                    <div class="toggle-switch">
                        <input type="checkbox" id="autoFillToggle">
                        <span class="slider"></span>
                    </div>
                </label>
                <p class="toggle-description" data-i18n="popupAutofillDescription">If your browser fills in the username and password, the extension continues the login automatically.</p>
            </div>
            
            <div class="municipality-section">
                <p class="municipality-label"><span data-i18n="popupSchoolLabel">School:</span> <span id="schoolDisplay">—</span></p>
                <p class="municipality-label"><span data-i18n="popupDomainLabel">Domain:</span> <span id="domainDisplay">—</span></p>
            </div>

            <button type="button" id="changeMunicipality" class="btn btn-settings" data-i18n="popupChangeSettings">Change settings</button>
        </div>
    </div>
    
    <script src="i18n.js"></script>
    <script src="popup.js"></script>
</body>
</html>
