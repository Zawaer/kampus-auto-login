<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kampus Auto Login</title>
    <link rel="stylesheet" href="popup.css">
</head>
<body class="popup-page">
    <div class="container">
        <header class="popup-header">
            <h1 data-i18n="popupTitle">Kampus Auto Login</h1>
        </header>
        <main class="content">
            <section class="toggles-section">
                <label class="toggle-row">
                    <span class="toggle-info">
                        <span class="toggle-name" data-i18n="popupEnableToggle">Auto Login</span>
                        <span class="toggle-desc" data-i18n="popupAutoLoginDescription">Automate redirects and button clicks</span>
                    </span>
                    <span class="toggle-switch">
                        <input type="checkbox" id="autoLoginToggle">
                        <span class="slider"></span>
                    </span>
                </label>

                <label class="toggle-row">
                    <span class="toggle-info">
                        <span class="toggle-name" data-i18n="popupAutofillToggle">Use autofilled credentials</span>
                        <span class="toggle-desc" data-i18n="popupAutofillDescription">Continue login when browser fills saved password</span>
                    </span>
                    <span class="toggle-switch">
                        <input type="checkbox" id="autoFillToggle">
                        <span class="slider"></span>
                    </span>
                </label>
            </section>

            <footer class="footer">
                <div class="school-info">
                    <span class="school-name" id="schoolDisplay">—</span>
                    <span class="school-domain" id="domainDisplay">—</span>
                </div>
                <div class="footer-actions">
                    <button type="button" id="changeMunicipality" class="btn-settings" data-i18n="popupChangeSettings">Settings</button>
                </div>
            </footer>
        </main>
    </div>
    
    <script src="i18n.js"></script>
    <script src="popup.js"></script>
</body>
</html>
